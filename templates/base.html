{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AI Study Buddy{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <header class="site-header">
        <a class="brand" href="{% url 'dashboard:home' %}">AI Study Buddy</a>
        <nav class="site-nav" aria-label="Main navigation">
            {% if user.is_authenticated %}
                <span class="nav-user">{{ user.username }}</span>
                <a href="{% url 'dashboard:home' %}">Dashboard</a>
                <a href="{% url 'notes:list' %}">Notes</a>
                <a href="{% url 'rag:chat' %}">Ask AI</a>
                <a href="{% url 'quiz:list' %}">Quizzes</a>
                <a href="{% url 'flashcards:list' %}">Flashcards</a>
                <a href="{% url 'summaries:list' %}">Summaries</a>
                <form method="post" action="{% url 'accounts:logout' %}">
                    {% csrf_token %}
                    <button class="link-button" type="submit">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'accounts:login' %}">Login</a>
                <a href="{% url 'accounts:register' %}">Register</a>
            {% endif %}
        </nav>
    </header>
    <main class="page">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
