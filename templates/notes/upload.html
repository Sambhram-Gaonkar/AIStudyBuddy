{% extends 'base.html' %}

{% block title %}Upload Notes | AI Study Buddy{% endblock %}

{% block content %}
<section class="auth-panel">
    <h1>Upload Notes</h1>
    <p>Upload PDF, DOCX, PPTX, PNG, JPG, TIFF, or BMP notes.</p>
    <form method="post" enctype="multipart/form-data" class="form-stack">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Upload</button>
    </form>
</section>
{% endblock %}
