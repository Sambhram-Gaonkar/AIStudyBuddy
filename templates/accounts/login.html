{% extends 'base.html' %}

{% block title %}Login | AI Study Buddy{% endblock %}

{% block content %}
<section class="auth-panel">
    <h1>Login</h1>
    <form method="post" class="form-stack">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>
    <p>New here? <a href="{% url 'accounts:register' %}">Create an account</a>.</p>
</section>
{% endblock %}
